name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: arctic_rss
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d arctic_rss"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arctic_rss?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:deploy
      - run: npx prisma migrate status
      - run: npx prisma migrate diff --from-config-datasource --to-schema=prisma/schema.prisma --exit-code
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
