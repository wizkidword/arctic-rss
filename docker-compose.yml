services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 512m
    pids_limit: 128
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arctic_rss}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging:
      driver: local
      options:
        max-file: "3"
        max-size: "10m"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 320m
    pids_limit: 64
    # Queue data and limiter counters share Redis. noeviction preserves queue
    # integrity; a full Redis fails protected actions closed instead of evicting jobs.
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data
    logging:
      driver: local
      options:
        max-file: "3"
        max-size: "10m"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  migrate:
    build:
      context: .
      target: worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cpus: 0.5
    mem_limit: 512m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-file: "3"
        max-size: "10m"

  web:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cpus: 0.75
    mem_limit: 512m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/live').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    logging:
      driver: local
      options:
        max-file: "3"
        max-size: "10m"

  worker:
    build:
      context: .
      target: worker
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cpus: 0.75
    mem_limit: 512m
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs = require('node:fs'); try { const age = Date.now() - fs.statSync('/tmp/arctic-rss-worker-heartbeat').mtimeMs; process.exit(age < 90000 ? 0 : 1) } catch { process.exit(1) }",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    stop_grace_period: 60s
    command: ["npm", "run", "worker"]
    logging:
      driver: local
      options:
        max-file: "3"
        max-size: "10m"

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    profiles: ["tunnel"]
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    pids_limit: 64
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: ["tunnel", "--no-autoupdate", "run"]
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: local
      options:
        max-file: "3"
        max-size: "10m"

volumes:
  postgres-data:
  redis-data:
